services:
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 80:80/tcp
      - 443:443/tcp
      - 67:67/udp
      - 123:123/udp
    environment:
      TZ: Europe/London
      FTLCONF_webserver_api_password: 'correct horse battery staple'
      FTLCONF_dns_listeningMode: ALL
      PIHOLE_UID: 1000
      PIHOLE_GID: 1000
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped
    networks:
      pihole-network:
        ipv4_address: 172.20.0.11

  unbound:
    image: guidcruncher/unbound-dns
    container_name: unbound
    hostname: unbound
    restart: unless-stopped
    networks:
      pihole-network:
        ipv4_address: 172.20.0.10
    ports:
      - "5335:5335/udp"
      - "5335:5335/tcp"
    environment:
      - ALLOWED_NETWORK=172.20.0.0/16
      - INTERFACE=0.0.0.0
      - PORT=5335

networks:
  pihole-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
